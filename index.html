<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мои Страницы</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #eee; padding: 50px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; max-width: 800px; margin: 0 auto; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 10px; text-decoration: none; color: #38bdf8; border: 1px solid #333; transition: 0.2s; }
        .card:hover { border-color: #38bdf8; background: #252525; transform: translateY(-3px); }
    </style>
</head>
<body>

    <h1>Содержимое /pages</h1>
    <div id="grid" class="grid">Загрузка...</div>

    <script>
        // УКАЖИ СВОИ ДАННЫЕ ТУТ
        const GITHUB_USER = 'mfls0fk'; 
        const GITHUB_REPO = 'mfls0fk.github.io'; 
        const FOLDER = 'pages';

        async function init() {
            const grid = document.getElementById('grid');
            const isLocal = window.location.protocol === 'file:';
            const isGithub = window.location.hostname.includes('github.io');

            if (isLocal) {
                grid.innerHTML = '<p style="color:orange">Ошибка CORS! <br> Файлы нельзя смотреть просто двойным кликом. <br> Используйте Live Server в VS Code или Python сервер.</p>';
                return;
            }

            try {
                let files = [];
                
                if (isGithub) {
                    // Тянем список файлов через GitHub API
                    const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FOLDER}`);
                    const data = await res.json();
                    files = data.filter(f => f.name.endsWith('.html')).map(f => f.name);
                } else {
                    // Локальный сервер (например, Live Server или Python)
                    const res = await fetch(`./${FOLDER}/`);
                    const html = await res.text();
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    files = Array.from(doc.querySelectorAll('a'))
                                 .map(a => a.getAttribute('href'))
                                 .filter(href => href.endsWith('.html'));
                }

                grid.innerHTML = '';
                files.forEach(fileName => {
                    // Очистка имени от лишних путей (убираем /pages/ если оно прилетело в ссылке)
                    const pureName = fileName.split('/').pop();
                    const card = document.createElement('a');
                    card.className = 'card';
                    // Ссылка всегда строится ОТНОСИТЕЛЬНО корня: pages/имя_файла.html
                    card.href = `./${FOLDER}/${pureName}`;
                    card.innerHTML = `📄 ${pureName.replace('.html', '')}`;
                    grid.appendChild(card);
                });

            } catch (e) {
                grid.innerHTML = 'Ошибка загрузки файлов.';
                console.error(e);
            }
        }

        init();
    </script>
</body>
</html>
